<p>**头文件 **  Dialog.h</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br></pre></td><td class="code"><pre><code class="hljs C++(Qt)">#ifndef DIALOG_H<br>#define DIALOG_H<br><br>#include &lt;QDialog&gt;<br>#include &lt;QLineEdit&gt;<br>#include &lt;ActiveQt/QAxWidget&gt;<br><br>namespace Ui &#123;<br>class Dialog;<br>&#125;<br><br>class Dialog : public QDialog<br>&#123;<br>  Q_OBJECT<br><br>public:<br>  explicit Dialog(QWidget *parent = 0);<br>  ~Dialog();<br><br>private slots:<br>  void loadNavigate();<br>  void GetDebugTool();<br>private:<br>  Ui::Dialog *ui;<br>  QLineEdit *lineUrl;<br>  QAxWidget* webWidget;<br>&#125;;<br><br>#endif // DIALOG_H<br><br></code></pre></td></tr></table></figure>

>61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br></pre></td><td class="code"><pre><code class="hljs C++(Qt)">#include &quot;Dialog.h&quot;<br>#include &quot;ui_Dialog.h&quot;<br>#include &lt;QVBoxLayout&gt;<br>#include &lt;QFile&gt;<br>#include &lt;QTextStream&gt;<br>#include &lt;QAxObject&gt;<br><br>Dialog::Dialog(QWidget *parent) :<br>  QDialog(parent),<br>  ui(new Ui::Dialog)<br>&#123;<br>  ui-&gt;setupUi(this);<br><br>  lineUrl = new QLineEdit;<br>  lineUrl-&gt;setText(&quot;https://liruilong9999.github.io/&quot;);<br>  connect(lineUrl,SIGNAL(returnPressed()),this,SLOT(loadNavigate()));<br><br>  webWidget = new QAxWidget;<br>  //设置ActiveX控件为IEMicrosoft Web Browser<br>  //设置ActiveX控件的id，最有效的方式就是使用UUID<br>  //此处的&#123;8856F961-340A-11D0-A96B-00C04FD705A2&#125;就是Microsoft Web Browser控件的UUID<br>  webWidget-&gt;setControl(QString::fromUtf8(&quot;&#123;8856F961-340A-11D0-A96B-00C04FD705A2&#125;&quot;));<br>  webWidget-&gt;setObjectName(QString::fromUtf8(&quot;webWidget&quot;));//设置控件的名称<br>  webWidget-&gt;setFocusPolicy(Qt::StrongFocus);//设置控件接收键盘焦点的方式：鼠标单击、Tab键<br>  webWidget-&gt;setProperty(&quot;DisplayAlerts&quot;,false); //不显示任何警告信息。<br>  webWidget-&gt;setProperty(&quot;DisplayScrollBars&quot;,true); // 显示滚动条<br><br>  QVBoxLayout *mainLayout = new QVBoxLayout;<br>  mainLayout-&gt;addWidget(lineUrl);<br>  mainLayout-&gt;addWidget(webWidget);<br>  setLayout(mainLayout);<br><br>  setWindowState(Qt::WindowMaximized);//最大化<br><br>//  QString DOC = webWidget-&gt;generateDocumentation();<br>//  QFile outFile(&quot;com_function.html&quot;);<br>//  outFile.open(QIODevice ::ReadWrite|QIODevice ::Text);<br>//  QTextStream TS(&amp;outFile);<br>//  TS&lt;&lt;DOC&lt;&lt;endl;<br><br>  setWindowTitle(&quot;浏览器&quot;);<br>  this-&gt;setWindowFlags(Qt::Dialog | Qt::WindowMinMaxButtonsHint | Qt::WindowCloseButtonHint);<br><br>&#125;<br><br>Dialog::~Dialog()<br>&#123;<br>  delete ui;<br>&#1
