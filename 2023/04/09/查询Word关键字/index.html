tring Text)<br>&#123;<br>    ui-&gt;resultTable-&gt;clear();<br>    InitWidget();<br>    <span class="hljs-keyword">if</span>(Text==<span class="hljs-string">&quot;&quot;</span>)<span class="hljs-keyword">return</span>;<br>    <span class="hljs-comment">//std::map&lt;QString,std::vector&lt;WordCompose&gt;&gt;</span><br>    <span class="hljs-comment">//std::vector&lt;WordCompose&gt; wordCompose = _P-&gt;_AllWordC[Text];</span><br>    <span class="hljs-keyword">int</span> row =<span class="hljs-number">0</span>;<br>    <span class="hljs-keyword">for</span>(auto filepath : _P-&gt;_KeyFileNames)<br>    &#123;<br>        ui-&gt;resultTable-&gt;insertRow(row);<br>        QString fileName = filepath.section(<span class="hljs-string">&#x27;\\&#x27;</span>, <span class="hljs-number">-1</span>);<br>        ui-&gt;resultTable-&gt;setItem(row, <span class="hljs-number">0</span>, <span class="hljs-keyword">new</span> QTableWidgetItem(fileName));<br>        ui-&gt;resultTable-&gt;setItem(row, <span class="hljs-number">1</span>, <span class="hljs-keyword">new</span> QTableWidgetItem(filepath));<br>    &#125;<br>&#125;<br><br><span class="hljs-keyword">bool</span> Widget::IsContainsKeyWords(QString Path, QString KeyWords)<br>&#123;<br>    <span class="hljs-comment">// Word 应用程序对象</span><br>    QAxObject* word = <span class="hljs-keyword">new</span> QAxObject(<span class="hljs-string">&quot;Word.Application&quot;</span>);<br>    <span class="hljs-keyword">if</span> (!word) &#123;<br>        qDebug() &lt;&lt; <span class="hljs-string">&quot;Failed to create Word Application object!&quot;</span>;<br>        <span class="hljs-keyword">return</span> <span class="hljs-keyword">false</span>;<br>    &#125;<br><br>    <span class="hljs-comment">// 设置是否可见</span><br>    word-&gt;setProperty(<span class="hljs-string">&quot;Visible&quot;</span>, <span class="hljs-keyword">false</span>);<br><br>    <span class="hljs-comment">//打开 Word 文档</span><br>    QAxObject* documents = word-&gt;querySubObje
