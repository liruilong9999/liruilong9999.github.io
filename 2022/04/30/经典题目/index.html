e</span>() + B.<span class="hljs-built_in">size</span>(), <span class="hljs-number">0</span>);<br>		<span class="hljs-keyword">for</span> (<span class="hljs-type">int</span> i = <span class="hljs-number">0</span>; i &lt; A.<span class="hljs-built_in">size</span>(); i++) &#123;<br>			<span class="hljs-keyword">for</span> (<span class="hljs-type">int</span> j = <span class="hljs-number">0</span>; j &lt; B.<span class="hljs-built_in">size</span>(); j++) &#123;<br>				C[i + j] += A[i] * B[j];<br>			&#125;<br>		&#125;<br>		<span class="hljs-comment">//进位 </span><br>		<span class="hljs-type">int</span> t = <span class="hljs-number">0</span>;<br>		<span class="hljs-keyword">for</span> (<span class="hljs-type">int</span> i = <span class="hljs-number">0</span>; i &lt; C.<span class="hljs-built_in">size</span>(); i++) &#123;<br>			t += C[i];<br>			C[i] = t % <span class="hljs-number">10</span>;<br>			t /= <span class="hljs-number">10</span>;<br>		&#125;<br>		<span class="hljs-comment">//去掉尾部的0</span><br>		<span class="hljs-keyword">while</span> (C.<span class="hljs-built_in">size</span>() &gt; <span class="hljs-number">1</span> &amp;&amp; C.<span class="hljs-built_in">back</span>() == <span class="hljs-number">0</span>) C.<span class="hljs-built_in">pop_back</span>();<br>		<span class="hljs-keyword">return</span> C;<br><br>	&#125;<br><br>	<span class="hljs-comment">//尾插2个数据，先插个位</span><br>	<span class="hljs-function">string <span class="hljs-title">multiply</span><span class="hljs-params">(string num1, string num2)</span> </span>&#123;<br>		vector&lt;<span class="hljs-type">int</span>&gt;A, B;<br>		<span class="hljs-keyword">for</span> (<span class="hljs-type">int</span> i = num1.<span class="hljs-built_in">size</span>() - <span class="hljs-number">1</span>; i &gt;= <span class="hljs-number">0</span>; i--) &#123;<br>			A.<span class="hljs-built_in">push_back</span>(num1[i] - <span class="hljs-number">48</span>);<br>		&#125;<br>		<span class="hljs-keyword">for</span> (<span class="hljs-type">int</span> i = num2.<span class="hljs-built_in">size</span>() - <span class="hljs-number">1</span>; i &gt;= <span class="hljs-number">0</span>; i--) &#123;<br>			B.<span class="hljs-built_in">push_back</span>(num2[i] - <span class="hljs-number">48</span>);<br>		&#125;<br>		<span class="hljs-keyword">auto</span> C = <span class="hljs-built_in">mul</span>(A, B);<br>		<span class="hljs-comment">//将结果放入res</span><br>		string res = <span class="hljs-string">&quot;&quot;</span>;<br>		<span class="hljs-keyword">for</span> (<span class="hljs-type">int</span> i = C.<span class="hljs-built_in">size</span>() - <span class="hljs-number">1</span>; i &gt;= <span class="hljs-number">0</span>; i--) &#123;<br>			res += C[i] + <span class="hljs-number">48</span>;<br>		&#125;<br>		<span class="hljs-keyword">return</span> res;<br>	&#125;<br>	<span class="hljs-comment">//析构输出结果</span><br>	~<span class="hljs-built_in">Solution</span>() &#123;<br>		string res = <span class="hljs-built_in">multiply</span>(<span class="hljs-keyword">this</span>-&gt;num1, <span class="hljs-keyword">this</span>-&gt;num2);<br>		cout &lt;&lt; res &lt;&lt; endl;<br>	&#125;<br><span class="hljs-keyword">private</span>:<br>	string num1;<br>	string num2;<br>&#125;;<br><br><span class="hljs-function"><span class="hljs-type">void</span> <span class="hljs-title">test01</span><span class="hljs-params">()</span> </span>&#123;<br>	string num1 = <span class="hljs-string">&quot;5555554666666666666666666666666666666664444444444444444445648745&quot;</span>;<br>	string num2 = <span class="hljs-string">&quot;5555554666666666666666666666666666666664444444444444444445648745&quot;</span>;<br>	<span class="hljs-function">Solution <span class="hljs-title">A</span><span class="hljs-params">(num1, num2)</span></span>;<br>&#125;<br><br><span class="hljs-function"><span class="hljs-type">int</span> <span class="hljs-title">main</span><span class="hljs-params">()</span> </span>&#123;<br><br>	<span class="hljs-built_in">t
